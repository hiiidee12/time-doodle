<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Doodle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;font-family:'Courier New',monospace}
canvas{display:block;position:absolute;top:0;left:0}
#clock{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  color:#fff;font-size:1.4rem;letter-spacing:0.3em;opacity:0.7;
  text-shadow:0 0 10px rgba(0,255,200,0.8),0 0 30px rgba(0,255,200,0.4);
  z-index:10;pointer-events:none;
}
#info{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,0.25);font-size:0.7rem;letter-spacing:0.15em;
  z-index:10;pointer-events:none;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="clock"></div>
<div id="info">each second draws a mark · sacred geometry unfolds</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const clockEl = document.getElementById('clock');

let W, H, cx, cy, maxR;
let t = 0; // total seconds elapsed
let marks = [];
let lastSecond = -1;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
  maxR = Math.min(W, H) * 0.42;
}

window.addEventListener('resize', resize);
resize();

// Spirograph parameters — multiple overlapping epitrochoids
const layers = [
  { R: 1.0, r: 0.37, d: 0.75, hueBase: 160, hueSpan: 180, size: 2.2 },
  { R: 1.0, r: 0.23, d: 0.65, hueBase: 280, hueSpan: 140, size: 1.8 },
  { R: 1.0, r: 0.53, d: 0.45, hueBase: 30,  hueSpan: 120, size: 2.0 },
  { R: 1.0, r: 0.67, d: 0.35, hueBase: 340, hueSpan: 100, size: 1.5 },
  { R: 1.0, r: 0.41, d: 0.85, hueBase: 60,  hueSpan: 200, size: 1.6 },
];

function getMarkPos(layer, angle) {
  const { R, r, d } = layer;
  const diff = R - r;
  const x = diff * Math.cos(angle) + d * Math.cos((diff / r) * angle);
  const y = diff * Math.sin(angle) + d * Math.sin((diff / r) * angle);
  return { x: cx + x * maxR * 0.5, y: cy + y * maxR * 0.5 };
}

function hslStr(h, s, l, a) {
  return `hsla(${h},${s}%,${l}%,${a})`;
}

function drawMark(layer, angle, age) {
  const pos = getMarkPos(layer, angle);
  const { hueBase, hueSpan, size } = layer;
  const hue = (hueBase + age * 3.7) % 360;
  const alpha = Math.min(1, 0.6 + age * 0.002);

  // Glow
  ctx.shadowColor = hslStr(hue, 100, 65, 1);
  ctx.shadowBlur = 12;
  ctx.fillStyle = hslStr(hue, 100, 70, alpha);
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Bright center
  ctx.fillStyle = hslStr(hue, 100, 95, Math.min(1, alpha + 0.2));
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, size * 0.4, 0, Math.PI * 2);
  ctx.fill();
}

function drawAllMarks() {
  for (const m of marks) {
    const age = t - m.t;
    drawMark(m.layer, m.angle, age);
  }
}

function addSecondMark() {
  for (let i = 0; i < layers.length; i++) {
    const angle = t * 0.19 + i * 1.256; // golden-angle-ish offset per layer
    marks.push({ layer: layers[i], angle, t });
  }
}

function drawHourHand() {
  const now = new Date();
  const h = now.getHours() % 12;
  const m = now.getMinutes();
  const s = now.getSeconds();
  const ms = now.getMilliseconds();
  const angle = ((h + m / 60 + s / 3600) / 12) * Math.PI * 2 - Math.PI / 2;
  const len = maxR * 0.25;
  ctx.strokeStyle = 'rgba(0,255,200,0.15)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(angle) * len, cy + Math.sin(angle) * len);
  ctx.stroke();
}

function drawMinuteDots() {
  for (let i = 0; i < 60; i++) {
    const angle = (i / 60) * Math.PI * 2 - Math.PI / 2;
    const r1 = maxR * 0.46;
    const r2 = i % 5 === 0 ? maxR * 0.43 : maxR * 0.445;
    const x1 = cx + Math.cos(angle) * r1;
    const y1 = cy + Math.sin(angle) * r1;
    const x2 = cx + Math.cos(angle) * r2;
    const y2 = cy + Math.sin(angle) * r2;
    ctx.strokeStyle = i % 5 === 0 ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.05)';
    ctx.lineWidth = i % 5 === 0 ? 1.5 : 0.8;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }
}

function drawSecondHand() {
  const now = new Date();
  const s = now.getSeconds() + now.getMilliseconds() / 1000;
  const angle = (s / 60) * Math.PI * 2 - Math.PI / 2;
  const len = maxR * 0.40;
  ctx.strokeStyle = 'rgba(0,200,255,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(angle) * len, cy + Math.sin(angle) * len);
  ctx.stroke();
  // tip dot
  ctx.fillStyle = 'rgba(0,200,255,0.6)';
  ctx.beginPath();
  ctx.arc(cx + Math.cos(angle) * len, cy + Math.sin(angle) * len, 2.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawCenterDot() {
  const now = new Date();
  const pulse = 1 + Math.sin(now.getMilliseconds() / 1000 * Math.PI * 2) * 0.3;
  ctx.fillStyle = 'rgba(0,255,200,0.8)';
  ctx.shadowColor = 'rgba(0,255,200,0.9)';
  ctx.shadowBlur = 15 * pulse;
  ctx.beginPath();
  ctx.arc(cx, cy, 4 * pulse, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');
  clockEl.textContent = `${hh} : ${mm} : ${ss}`;
}

function frame() {
  const now = new Date();
  const currentSecond = now.getSeconds();

  // Add a new mark each second
  if (currentSecond !== lastSecond) {
    lastSecond = currentSecond;
    addSecondMark();
    t++;
    updateClock();
  }

  // Fade background slightly for trail effect
  ctx.fillStyle = 'rgba(10,10,15,0.08)';
  ctx.fillRect(0, 0, W, H);

  drawMinuteDots();
  drawAllMarks();
  drawHourHand();
  drawSecondHand();
  drawCenterDot();

  requestAnimationFrame(frame);
}

updateClock();
requestAnimationFrame(frame);
</script>
</body>
</html>
